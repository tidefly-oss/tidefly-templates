{
  "slug": "mariadb",
  "name": "MariaDB",
  "category": "database",
  "icon": "mariadb",
  "description": "A community-developed fork of MySQL with extra features and performance improvements.",
  "versions": ["11.8", "11.4", "11.2"],
  "default_version": "11.8",
  "fields": [
    {
      "key": "service_name",
      "label": "Service Name",
      "type": "string",
      "placeholder": "my-mariadb",
      "required": true,
      "generated": false
    },
    {
      "key": "db_name",
      "label": "Database Name",
      "type": "string",
      "placeholder": "mydb",
      "required": true,
      "generated": false
    },
    {
      "key": "db_user",
      "label": "Database User",
      "type": "string",
      "placeholder": "myuser",
      "required": true,
      "generated": false
    },
    {
      "key": "db_password",
      "label": "Password",
      "type": "credential",
      "required": true,
      "generated": true,
      "store_hash": true,
      "show_plaintext_once": true
    },
    {
      "key": "root_password",
      "label": "Root Password",
      "type": "credential",
      "required": true,
      "generated": true,
      "store_hash": true,
      "show_plaintext_once": true
    },
    {
      "key": "expose",
      "label": "Expose externally via TLS",
      "type": "boolean",
      "default": false,
      "required": false
    },
    {
      "key": "external_port",
      "label": "External Port",
      "type": "port",
      "required": false,
      "depends_on": "expose"
    }
  ],
  "manifest": {
    "apiVersion": "tidefly/v1",
    "kind": "service",
    "metadata": {
      "name": "{service_name}",
      "labels": {
        "tidefly.template": "mariadb",
        "tidefly.source": "template"
      }
    },
    "spec": {
      "container": {
        "image": "mariadb:{version}",
        "env": [
          { "name": "MARIADB_ROOT_PASSWORD", "value": "{root_password}" },
          { "name": "MARIADB_DATABASE", "value": "{db_name}" },
          { "name": "MARIADB_USER", "value": "{db_user}" },
          { "name": "MARIADB_PASSWORD", "value": "{db_password}" }
        ],
        "volumes": [
          { "name": "{service_name}_data", "mountPath": "/var/lib/mysql" }
        ]
      },
      "health": {
        "test": ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"],
        "interval": "5s",
        "timeout": "5s",
        "retries": 10,
        "startPeriod": "30s"
      },
      "scaling": {
        "replicas": 1,
        "restart": "always",
        "strategy": "rolling"
      }
    }
  }
}