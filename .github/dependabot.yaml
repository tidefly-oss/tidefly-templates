version: 2
updates:
  # ─── GitHub Actions ────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: "Europe/Berlin"
    assignees:
      - dbuettgen
    labels:
      - dependencies
      - github-actions
    groups:
      actions:
        patterns:
          - "*"
