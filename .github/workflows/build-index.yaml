name: Build Index

on:
  push:
    branches: [main]
    paths:
      - "**/template.json"
      - ".github/workflows/build-index.yaml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    name: Build index.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build index.json
        run: |
          echo "Building index.json from all templates..."

          jq -n \
            '[inputs | {
              slug,
              name,
              category,
              icon,
              description,
              tags,
              versions,
              default_version,
              docs_url,
              min_tidefly,
              official
            }]' \
            $(find . -name "template.json" \
              ! -path "./example/*" \
              | sort) \
          > index.json

          COUNT=$(jq length index.json)
          echo "Built index.json with $COUNT templates"

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet index.json 2>/dev/null && git ls-files --error-unmatch index.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR with updated index
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/rebuild-index
          delete-branch: true
          commit-message: "chore: rebuild index.json"
          title: "chore: rebuild index.json"
          body: |
            Automatically generated by the Build Index workflow.

            Updates `index.json` to reflect the latest templates on `main`.
          labels: automated
          assignees: ${{ github.actor }}