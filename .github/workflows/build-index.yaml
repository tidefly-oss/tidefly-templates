name: Build Index

on:
  push:
    branches: [main]
    paths:
      - "**/*.json"
      - "!index.json"
      - ".github/workflows/build-index.yaml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    name: Build index.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build index.json
        run: |
          echo "Building index.json from all templates..."

          FILES=$(find . -name "*.json" \
            ! -path "./example/*" \
            ! -name "index.json" \
            | sort)

          if [ -z "$FILES" ]; then
            echo "[]" > index.json
            echo "No templates found"
            exit 0
          fi

          jq -n \
            '[inputs | {
              slug,
              name,
              category,
              icon,
              description,
              tags,
              versions,
              default_version,
              docs_url,
              min_tidefly,
              official
            }]' \
            $FILES \
          > index.json

          COUNT=$(jq length index.json)
          echo "Built index.json with $COUNT templates"
          cat index.json | jq .

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet index.json 2>/dev/null && git ls-files --error-unmatch index.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create or update PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B chore/rebuild-index
          git add index.json
          git commit -m "chore: rebuild index.json"
          git push origin chore/rebuild-index --force

          gh pr create \
            --title "chore: rebuild index.json" \
            --body "Automatically generated. Updates \`index.json\` to reflect the latest templates on \`main\`." \
            --base main \
            --head chore/rebuild-index \
          || echo "PR already exists, branch updated"