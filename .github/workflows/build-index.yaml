name: Build Index

on:
  push:
    branches: [main]
    paths:
      - "../../example/template.json"
      - ".github/workflows/build-index.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build index.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build index.json
        run: |
          echo "Building index.json from all templates..."

          # Find all template.json files, exclude example/ folder
          jq -n \
            '[inputs | {
              slug,
              name,
              category,
              icon,
              description,
              tags,
              versions,
              default_version,
              docs_url,
              min_tidefly,
              official
            }]' \
            $(find . -name "template.json" \
              ! -path "./example/*" \
              | sort) \
          > index.json

          COUNT=$(jq length index.json)
          echo "Built index.json with $COUNT templates"
          cat index.json | jq .

      - name: Commit index.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: rebuild index.json (${{ github.sha }})"
          file_pattern: index.json
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"